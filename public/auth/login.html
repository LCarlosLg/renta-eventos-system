<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Usuarios</title>
<link rel="stylesheet" href="../assets/css/global.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="login-container">

<img src="../assets/img/icono_sin_fondo.png"
    alt="Logotipo doña maya" 
    class="logotipo">

<h2>Iniciar Sesión</h2>

<form id="loginForm">

    <div class="input-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" required>
    </div>

    <div class="input-group">
        <label>Contraseña</label>

        <div class="password-container">
            <input type="password" id="password" required>
            <i id="togglePassword" class="fa-solid fa-eye toggle-btn"></i>
        </div>

    </div>

    <button type="submit">Ingresar</button>

    <p class="registro-texto">
        ¿No tienes una cuenta?
        <a href="/auth/registro.html" class="crear-cuenta">Crear cuenta</a>
    </p>

</form>

<p id="mensaje"></p>

</div>

<script src="../assets/js/login.js"></script>
</body>
</html>
