<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="login-container">

    <img src="img/icono_sin_fondo.png" 
        alt="Logotipo doña maya" 
        class="logotipo">

    <h2>Crear Cuenta</h2>

    <form id="registroForm">

        <div class="input-group">
            <label>Nombre</label>
            <input type="text" id="nombre" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-group">
            <label>Teléfono</label>
            <input type="text" id="telefono" required>
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <div class="password-container">
                <input type="password" id="password" required>
                <i id="togglePassword" class="fa-solid fa-eye toggle-btn"></i>
            </div>
        </div>

        <button type="submit">Registrar</button>

        <p class="registro-texto">
            ¿Ya tienes cuenta?
            <a href="login.html" class="crear-cuenta">Iniciar sesión</a>
        </p>

    </form>

    <p id="mensaje"></p>

</div>

<script src="registro.js"></script>
</body>
</html>
