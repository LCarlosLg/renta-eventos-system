<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de Cliente</title>
<link rel="stylesheet" href="../assets/css/global.css">
<link rel="stylesheet" href="../assets/css/cliente.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="cliente-container">
    <header>
        <div class="brand">
            <img src="../assets/img/icono_sin_fondo.png" alt="Logotipo doña maya" class="header-logo">
            <h2>Renta Mantelería y Cristalería</h2>
        </div>
        <nav>
            <a href="catalogo.html"><i class="fas fa-store"></i> Catálogo</a>
            <a href="carrito.html"><i class="fas fa-shopping-cart"></i> Carrito</a>
            <a href="historial.html"><i class="fas fa-history"></i> Historial</a>
            <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
        </nav>
    </header>

    <div class="container">
        <h1>Perfil</h1>
        <form id="perfilForm">
            <label>Nombre</label>
            <input type="text" id="nombre" />

            <label>Teléfono</label>
            <input type="text" id="telefono" />

            <label>Dirección</label>
            <input type="text" id="direccion" />

            <label>Notas</label>
            <textarea id="notas" rows="3"></textarea>

            <label>Preferencias</label>
            <textarea id="preferencias" rows="3"></textarea>

            <button type="submit">Guardar</button>
            <p id="mensaje"></p>
        </form>
    </div>
</div>

<script src="../assets/js/perfil.js"></script>

</body>
</html>
