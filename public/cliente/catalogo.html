<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Css -->
<link rel="stylesheet" href="../assets/css/catalogo.css">
<link rel="stylesheet" href="../assets/css/alertas_catalogo.css">

<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500;1,600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
<div class="container-fluid">

    <!-- LOGO -->
    <a class="navbar-brand fw-bold d-flex align-items-center">
        <img src="../assets/img/icono_sin_fondo.png" alt="Logo" class="logo-navbar">
        Renta Doña Maya
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarScroll">

        <!-- MENÚ -->
        <ul class="navbar-nav me-auto">

            <li class="nav-item">
                <a class="nav-link" href="dashboard.html">Inicio</a>
            </li>

            <li class="nav-item dropdown">
                <a class="nav-link active dropdown-toggle" href="#" data-bs-toggle="dropdown">
                    Catálogo
                </a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="catalogo.html?tipo=manteleria">Mantelería</a></li>
                    <li><a class="dropdown-item" href="catalogo.html?tipo=cristaleria">Cristalería</a></li>
                </ul>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="carrito.html">Carrito</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="historial.html">Historial</a>
            </li>

        </ul>

        <!-- BUSCADOR -->
        <form class="d-flex me-3" onsubmit="return false;">
            <input 
                id="search" 
                class="form-control me-2" 
                type="search" 
                placeholder="Buscar producto..."
            >
            <button id="btnBuscar" class="btn btn-dark">Buscar</button>
        </form>

        <!-- ICONOS DERECHA -->
        <div class="d-flex align-items-center gap-3">

            <!-- FAVORITOS -->
            <div class="icono-nav">
                <i class="fa-regular fa-heart"></i>
            </div>

            <!-- NOTIFICACIONES -->
            <div class="icono-nav position-relative">
                <i class="fa-regular fa-bell"></i>
                <span class="badge-noti">3</span>
            </div>

            <!-- PERFIL -->
            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                    <img id="avatarNavbar" src="https://i.pravatar.cc/40" class="avatar">
                </a>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="perfil.html">Mi Perfil</a></li>
                    <li><a class="dropdown-item" href="historial.html">Mis Rentas</a></li>
                    <li><a class="dropdown-item" href="#">Configuración</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="#" onclick="cerrarSesion()">Cerrar sesión</a></li>
                </ul>
            </div>

        </div>

    </div>
</div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-4">

    <!-- BANNER -->
    <div class="banner-catalogo">
        <div class="titulo-banner">
            <i class="fa-solid fa-box-open icono-banner"></i>
            <h1>Catálogo de Productos</h1>
        </div>
        <p class="subtitulo-banner">Explora nuestros productos disponibles</p>
    </div>

    <!-- PRODUCTOS -->
    <div class="row mt-4" id="productos"></div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- JS -->
<script src="../assets/js/cliente.js"></script>

</body>
</html>
