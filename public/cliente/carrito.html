<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Css -->
<link rel="stylesheet" href="../assets/css/cliente.css">
<link rel="stylesheet" href="../assets/css/carrito.css">
<link rel="stylesheet" href="../assets/css/alertas.css">

<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- Barra de navegación -->
<nav class="navbar navbar-expand-lg shadow-sm">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold" href="dashboard.html">
      🛒 Renta Doña Maya
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarScroll">

      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link" href="dashboard.html">Inicio</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="catalogo.html">Catálogo</a>
        </li>

        <!-- Activo -->
        <li class="nav-item">
          <a class="nav-link active nav-active" href="#">Carrito</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="historial.html">Historial</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="perfil.html">Perfil</a>
        </li>

      </ul>

    </div>
  </div>
</nav>

<!--  Contenido -->
<div class="container">

    <!-- Banner -->
    <div class="banner">
        <h1><i class="fas fa-shopping-cart"></i> Tu Carrito</h1>
        <p>Administra tus productos antes de confirmar tu pedido</p>
    </div>

    <!-- Card -->
    <div class="card mt-4 p-4">

        <!-- Resumen -->
        <div class="d-flex justify-content-between align-items-center mb-3">

            <h5 class="m-0">
                🧾 Productos en carrito: 
                <span id="totalProductos">0</span>
            </h5>

            <a href="catalogo.html" class="btn-seguir">
                ➕ Agregar más productos
            </a>

        </div>

        <!-- Tabla -->
        <div class="table-responsive">
            <table class="table align-middle">

                <thead>
                    <tr>
                        <th>Producto</th>
                        <th style="width:150px;">Cantidad</th>
                        <th>Precio</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody id="carrito"></tbody>

            </table>
        </div>

        <!-- Total -->
        <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-3">

            <h3 class="m-0">
                Total: 
                <span class="total-precio">
                    $<span id="total">0</span>
                </span>
            </h3>

            <button class="btn-confirmar">
                Confirmar Pedido
            </button>

        </div>

    </div>

</div>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="../assets/js/carrito.js"></script>

</body>
</html>
